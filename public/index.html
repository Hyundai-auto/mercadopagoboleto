<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout PIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 9999;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .loading-overlay.active { display: flex; }
        .spinner {
            border: 4px solid rgba(0,0,0,0.1);
            width: 48px; height: 48px; border-radius: 50%;
            border-left-color: #22c55e; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <div id="loading" class="loading-overlay">
        <div class="spinner mb-4"></div>
        <p class="text-lg font-bold text-gray-800">Gerando seu PIX...</p>
        <p class="text-sm text-gray-500">Aguarde, estamos processando seu pedido com segurança.</p>
    </div>

    <div id="form-screen" class="max-w-md mx-auto mt-12 p-8 bg-white rounded-2xl shadow-xl">
        <h2 class="text-2xl font-black text-center text-gray-900 mb-8">Finalizar Pagamento</h2>
        
        <form id="pix-form" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Nome Completo</label>
                <input type="text" id="name" required class="w-full px-4 py-3 border-2 border-gray-100 rounded-xl focus:border-green-500 outline-none transition-all">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">E-mail</label>
                <input type="email" id="email" required class="w-full px-4 py-3 border-2 border-gray-100 rounded-xl focus:border-green-500 outline-none transition-all">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">CPF</label>
                    <input type="text" id="document" required placeholder="000.000.000-00" class="w-full px-4 py-3 border-2 border-gray-100 rounded-xl focus:border-green-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">WhatsApp</label>
                    <input type="tel" id="phone" required placeholder="(00) 00000-0000" class="w-full px-4 py-3 border-2 border-gray-100 rounded-xl focus:border-green-500 outline-none transition-all">
                </div>
            </div>
            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-green-200 transition-all transform active:scale-95 uppercase tracking-widest">
                Gerar PIX Agora
            </button>
        </form>
    </div>

    <div id="pix-screen" class="hidden max-w-md mx-auto mt-12 p-8 bg-white rounded-2xl shadow-xl text-center">
        <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
        </div>
        <h2 class="text-2xl font-black text-gray-900 mb-2">PIX Gerado!</h2>
        <p class="text-gray-500 text-sm mb-8">Copie o código abaixo e pague no seu banco.</p>
        
        <div class="bg-gray-50 p-4 rounded-xl border-2 border-dashed border-gray-200 mb-6">
            <textarea id="pix-code" readonly class="w-full bg-transparent text-xs text-gray-600 font-mono resize-none outline-none" rows="5"></textarea>
        </div>

        <button onclick="copyPix()" id="copy-btn" class="w-full bg-gray-900 hover:bg-black text-white font-bold py-4 rounded-xl transition-all flex items-center justify-center gap-2">
            <span>Copiar Código PIX</span>
        </button>
        <p id="copy-success" class="hidden text-green-600 font-bold text-sm mt-4">✓ Código copiado!</p>
    </div>

    <script>
        // MÁSCARAS
        const mask = (el, m) => {
            el.addEventListener('input', e => {
                let v = e.target.value.replace(/\D/g, '');
                if (m === 'cpf') {
                    v = v.slice(0, 11).replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
                } else {
                    v = v.slice(0, 11).replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
                }
                e.target.value = v;
            });
        };
        mask(document.getElementById('document'), 'cpf');
        mask(document.getElementById('phone'), 'phone');

        // SUBMIT
        document.getElementById('pix-form').addEventListener('submit', async e => {
            e.preventDefault();
            document.getElementById('loading').classList.add('active');

            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                document: document.getElementById('document').value.replace(/\D/g, ''),
                phone: document.getElementById('phone').value.replace(/\D/g, '')
            };

            try {
                // Substitua pela URL do seu app no Render após o deploy
                const API_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000' : '';
                
                const response = await fetch(`${API_URL}/generate-pix`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    document.getElementById('pix-code').value = result.pix_code;
                    document.getElementById('form-screen').classList.add('hidden');
                    document.getElementById('pix-screen').classList.remove('hidden');
                    
                    // Tenta copiar automático
                    copyPix(true);
                } else {
                    alert('Erro ao gerar PIX: ' + (result.details || 'Tente novamente'));
                }
            } catch (err) {
                alert('Erro de conexão com o servidor.');
            } finally {
                document.getElementById('loading').classList.remove('active');
            }
        });

        function copyPix(silent = false) {
            const code = document.getElementById('pix-code');
            code.select();
            document.execCommand('copy');
            if (!silent) {
                const btn = document.getElementById('copy-btn');
                const success = document.getElementById('copy-success');
                success.classList.remove('hidden');
                btn.innerText = '✓ Copiado';
                setTimeout(() => {
                    success.classList.add('hidden');
                    btn.innerText = 'Copiar Código PIX';
                }, 2000);
            }
        }
    </script>
</body>
</html>
