<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Seguro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold mb-6 text-center text-gray-800">Finalizar Compra</h1>
        
        <div id="checkout-form">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Nome Completo</label>
                <input type="text" id="payer_name" class="w-full p-3 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Seu nome">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">CPF</label>
                <input type="text" id="payer_cpf" class="w-full p-3 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="000.000.000-00">
            </div>
            <button onclick="generatePix()" id="btn-generate" class="w-full bg-green-600 text-white font-bold py-3 rounded hover:bg-green-700 transition duration-300">
                GERAR PIX
            </button>
        </div>

        <div id="pix-result" class="hidden mt-6">
            <div class="bg-green-50 p-4 rounded border border-green-200 text-center">
                <p class="text-green-800 font-medium mb-2">PIX Gerado com Sucesso!</p>
                <textarea id="pix-code" readonly class="w-full p-2 text-xs border rounded bg-white h-24 mb-4"></textarea>
                <button onclick="copyPix()" class="bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700">
                    Copiar Código PIX
                </button>
            </div>
        </div>

        <div id="loading" class="hidden mt-4 text-center text-gray-600">
            Processando, por favor aguarde...
        </div>
    </div>

    <script>
        async function generatePix() {
            const name = document.getElementById('payer_name').value;
            const cpf = document.getElementById('payer_cpf').value;
            
            if (!name || !cpf) {
                alert('Preencha nome e CPF');
                return;
            }

            document.getElementById('checkout-form').classList.add('opacity-50', 'pointer-events-none');
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('btn-generate').disabled = true;

            try {
                const response = await fetch('/proxy/pix', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ payer_name: name, payer_cpf: cpf })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('pix-code').value = data.pixCode;
                    document.getElementById('pix-result').classList.remove('hidden');
                    document.getElementById('checkout-form').classList.add('hidden');
                } else {
                    alert('Erro ao gerar PIX: ' + (data.error || 'Erro desconhecido'));
                }
            } catch (error) {
                alert('Erro na conexão com o servidor');
            } finally {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('btn-generate').disabled = false;
                document.getElementById('checkout-form').classList.remove('opacity-50', 'pointer-events-none');
            }
        }

        function copyPix() {
            const copyText = document.getElementById("pix-code");
            copyText.select();
            document.execCommand("copy");
            alert("Código PIX copiado!");
        }
    </script>
</body>
</html>
